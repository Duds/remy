services:
  remy:
    build:
      context: .
      secrets:
        - HF_TOKEN
    env_file: .env
    environment:
      AZURE_ENVIRONMENT: "false"
      DATA_DIR: /app/data
      OLLAMA_BASE_URL: http://ollama:11434
      HEALTH_PORT: "8080"
      # Git tools (Bug 41): point at remy repo so git_log/git_diff/etc. work. Override in .env if your repo path differs.
      WORKSPACE_ROOT: ${WORKSPACE_ROOT:-/home/remy/Projects/ai-agents/remy}
    ports:
      - "8080:8080"   # health check endpoint
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ${HOME}/.config/gcloud:/home/remy/.config/gcloud:ro
      - ${HOME}/Projects:/home/remy/Projects
      - ${HOME}/Documents:/home/remy/Documents:ro
      - ${HOME}/Downloads:/home/remy/Downloads
      # Google Drive: set GDRIVE_MOUNT_PATH in .env to your host path (e.g. ~/Library/CloudStorage/GoogleDrive-<your-email>). Set GDRIVE_MOUNT_PATHS=/home/remy/GoogleDrive in .env so Remy can index/search. Unset = mount /var/empty (no Drive).
      - ${GDRIVE_MOUNT_PATH:-/var/empty}:/home/remy/GoogleDrive:ro
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  relay:
    build: ./relay_mcp
    ports:
      - "127.0.0.1:8765:8765"   # local only — Claude Code agents connect here
    volumes:
      - ./data:/app/data         # relay.db lives alongside other remy data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s = socket.create_connection(('localhost', 8765), timeout=3); s.close()"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ${HOME}/.ollama:/root/.ollama
    restart: unless-stopped

  # ── Cloudflare Tunnel (optional) ──────────────────────────────────────────
  # Exposes the health server (port 8080) via a secure public HTTPS URL
  # without port forwarding or a static IP.
  #
  # Setup (one-time, on the Mac Mini):
  #   1. Go to dash.cloudflare.com → Zero Trust → Networks → Tunnels
  #   2. Create a tunnel named "remy", choose Docker install
  #   3. Copy the token from the docker run command shown
  #   4. Add: CLOUDFLARE_TUNNEL_TOKEN=<token> to .env
  #   5. In tunnel config, add a Public Hostname:
  #        Hostname: remy.<your-domain>.com
  #        Service:  http://remy:8080
  #   6. Set HEALTH_API_TOKEN in .env to protect /logs and /telemetry
  #
  # Start with tunnel: make tunnel-up
  # Stop:              make tunnel-stop
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      remy:
        condition: service_healthy
    profiles:
      - tunnel

secrets:
  HF_TOKEN:
    file: .hf_token
